{% extends "admin/admin_base.html" %}

{% block admin_content %}

<section class="admin-page-content">
    <div class="admin-page-heading">
        <div>
            <span class="eyebrow">Edit Category</span>
            <h1>{{ category.name }}</h1>
            <p>Update this category name.</p>
        </div>

        <a href="{{ url_for('admin_categories') }}" class="btn-secondary admin-action-btn">
            Back to Categories
        </a>
    </div>

    <div class="admin-form-panel">
        <form method="POST" class="admin-form">
            <div class="form-group">
                <label for="name">Category Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    value="{{ category.name }}"
                    required
                >
            </div>

            <div class="owner-only-note">
                <strong>Note</strong>
                <p>
                    Changing this category name will also affect how it appears
                    on products currently using it.
                </p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Update Category</button>
                <a href="{{ url_for('admin_categories') }}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>

{% endblock %}
